name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main        # Otomatis deploy setiap push ke branch main
  workflow_dispatch:  # Bisa juga trigger manual dari tab Actions

permissions:
  contents: read
  pages: write
  id-token: write

# Hanya satu deploy berjalan sekaligus
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - name: Add .nojekyll
        run: touch out/.nojekyll   # Wajib agar GitHub Pages tidak proses folder _next

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
